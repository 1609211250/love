<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>婚礼请柬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 禁止页面滚动，不用滑动查看 */
            background: #f8f3f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        /* 顶部标题区域 */
        .title-box {
            margin-bottom: 16px;
        }
        .main-title {
            font-size: 26px;
            color: #991a2c;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }
        .info-text {
            font-size: 16px;
            color: #444;
            line-height: 1.6;
            text-align: center;
        }
        /* 视频容器 */
        .video-box {
            width: 100%;
            max-width: 460px;
            margin: 0 auto 20px;
            background: #222;
            border-radius: 12px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        /* 主祝福弹窗 */
        .modal-wrap {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 16px;
            padding: 28px 20px;
            box-shadow: 0 4px 20px rgba(150, 20, 40, 0.15);
        }
        .modal-top {
            font-size: 22px;
            color: #222;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-content {
            font-size: 17px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 26px;
            text-align: center;
        }
        .submit-btn {
            width: 80%;
            height: 52px;
            background: #c8384e;
            color: white;
            border: none;
            border-radius: 99px;
            font-size: 18px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }
        .submit-btn:active {
            background: #a82c3e;
        }
        /* 提交成功弹窗（默认隐藏，无按钮，3秒自动关闭） */
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 999;
        }
        .success-inner {
            background: #fff;
            border-radius: 16px;
            padding: 36px 22px;
            max-width: 420px;
            width: 100%;
        }
        .success-title {
            font-size: 28px;
            color: #991a2c;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-desc {
            font-size: 20px;
            line-height: 1.9;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 顶部标题 -->
    <div class="title-box">
        <h1 class="main-title">诚邀各位同事见证我的婚礼</h1>
        <div class="info-text">
            婚礼时间：2026年7月3日 | 举办地点：东北老家
        </div>
    </div>

    <!-- 视频：自动静音播放，点击视频解除静音出声音 -->
    <div class="video-box">
        <video id="myVideo" controls autoplay muted loop playsinline>
            <source src="wedding.mp4" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
    </div>

    <!-- 主祝福卡片 -->
    <div class="modal-wrap">
        <div class="modal-top">感谢送来的祝福！❤️</div>
        <div class="modal-content">
            婚礼主场在东北，距离湖南路途遥远，来回奔波太折腾大家，不用特意到场。
            <br>
            等我7月3日办完婚礼回公司上班，会安排大家集体聚餐，到时候一起吃饭热闹一下！
        </div>
        <button class="submit-btn">送出祝福</button>
    </div>

    <!-- 祝福成功弹窗（无按钮，3秒自动消失） -->
    <div class="success-modal" id="successPop">
        <div class="success-inner">
            <div class="success-title">祝福已收到❤️</div>
            <div class="success-desc">
                十分感谢各位同事的美好祝愿！<br>
                祝大家往后工作顺利、事事顺心、平安喜乐！
            </div>
        </div>
    </div>

    <script>
        const submitBtn = document.querySelector('.submit-btn');
        const successPop = document.getElementById('successPop');
        const video = document.getElementById('myVideo');

        // 点击视频取消静音，播放原声
        video.addEventListener('click', () => {
            video.muted = false;
        })

        // 点击送出祝福，弹窗3秒自动关闭
        submitBtn.addEventListener('click', () => {
            successPop.style.display = 'flex';
            setTimeout(() => {
                successPop.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
